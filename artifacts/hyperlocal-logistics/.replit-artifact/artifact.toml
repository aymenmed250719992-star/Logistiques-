kind = "mobile"
previewPath = "/"
title = "Hyper-Local AI Logistics"
version = "1.0.0"
id = "artifacts/hyperlocal-logistics"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24756

[services.development]
run = "pnpm --filter @workspace/hyperlocal-logistics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hyperlocal-logistics", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hyperlocal-logistics", "run", "serve" ]

[services.env]
PORT = "24756"
BASE_PATH = "/"
